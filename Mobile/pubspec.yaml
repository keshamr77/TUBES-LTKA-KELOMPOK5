name: absensi_lokasi
description: Sistem Absensi Berbasis Lokasi - GPS-based attendance system for campus.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  intl: ^0.19.0

  # Networking
  http: ^1.2.0

  # Location & Permissions
  geolocator: ^12.0.0
  permission_handler: ^11.3.0

  # Local Storage
  shared_preferences: ^2.2.2

  # Animations
  flutter_spinkit: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
