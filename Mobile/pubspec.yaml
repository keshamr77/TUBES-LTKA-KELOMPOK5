name: absensi_lokasi
description: Sistem Absensi Berbasis Lokasi - GPS-based attendance system for campus.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^8.1.0
  intl: ^0.20.2

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.4

  # Networking
  http: ^1.2.0

  # Location & Permissions
  geolocator: ^14.0.2
  permission_handler: ^12.0.1

  # Local Storage (untuk cache user profile saja, bukan token)
  shared_preferences: ^2.2.2

  # Animations
  flutter_spinkit: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
